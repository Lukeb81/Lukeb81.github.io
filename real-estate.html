<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📷 camera back · wheel & grid</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            user-select: none;
        }

        body {
            background: #2b2b2b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 16px;
        }

        /* main camera back plate */
        .camera-body {
            background: #1e1e1e;
            background-image: radial-gradient(circle at 30% 40%, #3a3a3a 2px, transparent 2px),
                              radial-gradient(circle at 70% 70%, #3a3a3a 1px, transparent 2px);
            background-size: 40px 40px;
            width: 860px;
            max-width: 100%;
            border-radius: 40px 40px 30px 30px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset -2px -3px 8px #0a0a0a, inset 3px 3px 8px #4f4f4f;
            padding: 25px 25px 35px 25px;
            border: 2px solid #3c3c3c;
        }

        /* top strip with fake dials / texture */
        .top-strip {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 20px;
            padding: 0 12px;
        }
        .top-strip .dial {
            width: 50px;
            height: 50px;
            background: #292929;
            border-radius: 50%;
            border: 2px solid #5a5a5a;
            box-shadow: inset -3px -3px 5px #101010, inset 2px 2px 5px #6a6a6a;
            position: relative;
        }
        .top-strip .dial::after {
            content: "⚙";
            position: absolute;
            color: #999;
            font-size: 24px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.5;
        }
        .top-strip .speaker {
            width: 80px;
            height: 18px;
            background: #2f2f2f;
            border-radius: 20px;
            box-shadow: inset 0 2px 4px #0c0c0c;
            border: 1px solid #505050;
        }
        .top-strip .label {
            color: #aaa;
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: 300;
            margin-left: auto;
            text-shadow: 0 1px 0 #1f1f1f;
        }

        /* main screen area – changes between grid and single */
        .display-panel {
            background: #141414;
            border-radius: 24px;
            padding: 20px;
            border: 4px solid #383838;
            box-shadow: inset 0 0 0 2px #5f5f5f, 0 8px 0 #0b0b0b;
            margin-bottom: 25px;
            min-height: 380px;
            transition: background 0.1s ease;
        }

        /* 3x3 grid layout */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            aspect-ratio: 1 / 0.9;
        }

        .grid-item {
            background: #2d2d2d;
            border-radius: 16px;
            border: 3px solid #4c4c4c;
            box-shadow: inset 0 0 0 1px #6a6a6a, 0 4px 0 #1b1b1b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ddd;
            font-weight: 500;
            transition: all 0.1s;
            cursor: pointer;
            padding: 12px 0 8px 0;
        }

        .grid-item.selected {
            border: 4px solid #ffcc00;
            box-shadow: 0 0 0 2px #f5e56b, 0 4px 0 #1b1b1b;
            transform: scale(1.01);
            background: #3b3b3b;
        }

        .grid-item .thumb-icon {
            font-size: 48px;
            line-height: 1;
            margin-bottom: 6px;
            filter: drop-shadow(2px 4px 4px #0f0f0f);
        }

        .grid-item .image-label {
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 15px;
            color: #efefef;
            border: 1px solid #777;
        }

        /* single image enlarged view */
        .single-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px;
            padding: 20px;
            background: #1b1b1b;
            border-radius: 20px;
            border: 2px solid #5d5d5d;
            box-shadow: inset 0 0 20px #0a0a0a;
        }

        .big-image {
            font-size: 140px;
            line-height: 1;
            filter: drop-shadow(0 8px 6px #080808);
            margin-bottom: 16px;
            background: #232323;
            padding: 20px 40px;
            border-radius: 60px;
            border: 2px solid #7a7a7a;
        }

        .big-label {
            font-size: 32px;
            background: #00000060;
            padding: 8px 28px;
            border-radius: 60px;
            color: #ffd966;
            border: 1px solid #b9a153;
            letter-spacing: 2px;
        }

        .hint-text {
            color: #8f8f8f;
            margin-top: 12px;
            font-size: 16px;
            border-top: 1px dashed #4a4a4a;
            padding-top: 10px;
        }

        /* bottom controls — wheel & buttons */
        .control-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 8px 10px 0 10px;
        }

        .nav-wheel {
            position: relative;
            width: 130px;
            height: 130px;
            background: #252525;
            border-radius: 999px;
            border: 5px solid #4b4b4b;
            box-shadow: inset 0 -3px 8px #0e0e0e, inset 0 3px 8px #6d6d6d, 0 10px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.05s linear;
        }

        .wheel-inner {
            width: 70px;
            height: 70px;
            background: #353535;
            border-radius: 50%;
            border: 3px solid #797979;
            box-shadow: inset -3px -3px 8px #1f1f1f, inset 3px 3px 8px #999999;
        }

        .wheel-symbols {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            font-weight: bold;
            color: #ccc;
            font-size: 22px;
            pointer-events: none;
        }

        .wheel-symbols div {
            position: absolute;
            text-shadow: 0 2px 2px black;
        }
        .sym-up { top: 8px; left: 55px; }
        .sym-down { bottom: 8px; left: 52px; }
        .sym-left { left: 12px; top: 52px; }
        .sym-right { right: 12px; top: 52px; }

        .button-group {
            display: flex;
            gap: 18px;
        }

        .camera-btn {
            background: #303030;
            border: none;
            border-bottom: 5px solid #121212;
            border-radius: 40px;
            padding: 16px 28px;
            font-size: 26px;
            font-weight: 600;
            color: #ddd;
            box-shadow: inset 1px 2px 5px #767676, 0 6px 0 #131313;
            cursor: pointer;
            transition: 0.06s linear;
            min-width: 110px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .camera-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            box-shadow: inset 2px 3px 6px #3f3f3f;
        }

        .menu-btn {
            background: #3a3a3a;
            color: #fee7a0;
        }

        .status-led {
            width: 20px;
            height: 20px;
            background: #303030;
            border-radius: 50%;
            border: 2px solid #5e5e5e;
            box-shadow: inset 0 0 5px #151515;
            margin-left: 5px;
        }

        .footer-text {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            color: #7a7a7a;
            font-size: 14px;
            padding: 0 8px;
        }
    </style>
</head>
<body>
<div class="camera-body">
    <!-- top decoration -->
    <div class="top-strip">
        <div class="dial"></div>
        <div class="speaker"></div>
        <div class="label">📷 EOS · 5n</div>
    </div>

    <!-- dynamic display area (grid / big image) -->
    <div class="display-panel" id="displayPanel">
        <!-- javascript will fill this -->
    </div>

    <!-- bottom interactive controls -->
    <div class="control-panel">
        <!-- The wheel: click areas for up/down/left/right (simulated) -->
        <div class="nav-wheel" id="wheel">
            <div class="wheel-inner" id="wheelInner"></div>
            <div class="wheel-symbols">
                <div class="sym-up">▲</div>
                <div class="sym-down">▼</div>
                <div class="sym-left">◀</div>
                <div class="sym-right">▶</div>
            </div>
        </div>
        <div class="button-group">
            <button class="camera-btn" id="okBtn">OK</button>
            <button class="camera-btn menu-btn" id="menuBtn">MENU</button>
        </div>
        <div class="status-led"></div>
    </div>

    <div class="footer-text">
        <span>⬤ LIVE</span>
        <span>GRID 3x3  ▶  SCROLL</span>
    </div>
</div>

<script>
    (function() {
        // ----- image data: 3x3 grid, but we simulate "scrolling" with 12 images (4 groups of 3x3)
        // each page holds 9 images, we have 4 pages. initial page = 0 (first 9)
        const allImages = [
            // page 0 (indices 0-8)
            { emoji: '🌄', name: 'alpine' },
            { emoji: '🌊', name: 'ocean' },
            { emoji: '🏞️', name: 'canyon' },
            { emoji: '🌲', name: 'forest' },
            { emoji: '🏔️', name: 'mountain' },
            { emoji: '🌃', name: 'night' },
            { emoji: '🌌', name: 'stars' },
            { emoji: '🏖️', name: 'beach' },
            { emoji: '🌋', name: 'volcano' },
            // page 1 (9-17)
            { emoji: '🛤️', name: 'rails' },
            { emoji: '🌁', name: 'fog' },
            { emoji: '🏜️', name: 'desert' },
            { emoji: '⛰️', name: 'peak' },
            { emoji: '🏝️', name: 'island' },
            { emoji: '🌅', name: 'sunrise' },
            { emoji: '🌇', name: 'sunset' },
            { emoji: '🏛️', name: 'ruins' },
            { emoji: '🕍', name: 'temple' },
            // page 2 (18-26)
            { emoji: '🗻', name: 'fuji' },
            { emoji: '🏯', name: 'castle' },
            { emoji: '🌿', name: 'jungle' },
            { emoji: '🍂', name: 'autumn' },
            { emoji: '❄️', name: 'winter' },
            { emoji: '🌈', name: 'rainbow' },
            { emoji: '☀️', name: 'sunny' },
            { emoji: '⛅', name: 'clouds' },
            { emoji: '🌧️', name: 'rain' },
            // page 3 (27-35)
            { emoji: '🌪️', name: 'tornado' },
            { emoji: '🔥', name: 'fire' },
            { emoji: '💧', name: 'water' },
            { emoji: '🌫️', name: 'mist' },
            { emoji: '🎑', name: 'moon' },
            { emoji: '🏙️', name: 'city' },
            { emoji: '🌆', name: 'dusk' },
            { emoji: '🗿', name: 'moai' },
            { emoji: '🗽', name: 'statue' }
        ];

        // total images = 36, pages = 4 (each 9)
        const IMGS_PER_PAGE = 9;
        const TOTAL_PAGES = 4;  // 36/9

        // state
        let currentPage = 0;                // 0..3
        let selectedIndexInPage = 0;         // 0..8  (position in current 3x3)
        let enlargedMode = false;            // whether big image is shown
        let enlargedImageIndex = 0;           // global index of currently enlarged image

        // DOM elements
        const displayPanel = document.getElementById('displayPanel');
        const okBtn = document.getElementById('okBtn');
        const menuBtn = document.getElementById('menuBtn');
        const wheel = document.getElementById('wheel');

        // helper: get global image index from page + internal index
        function globalIndex(page, idxInPage) {
            return page * IMGS_PER_PAGE + idxInPage;
        }

        // render based on state
        function renderDisplay() {
            if (!enlargedMode) {
                // show grid
                const startIdx = currentPage * IMGS_PER_PAGE;
                const pageImages = allImages.slice(startIdx, startIdx + IMGS_PER_PAGE);

                let gridHtml = '<div class="image-grid">';
                for (let i = 0; i < IMGS_PER_PAGE; i++) {
                    const img = pageImages[i];
                    const isSelected = (i === selectedIndexInPage);
                    const selectedClass = isSelected ? 'selected' : '';
                    // for grid items we use data属性 later for clicks but we can just rely on click on wheel. but click on grid also works?  we'll attach event delegation. but we keep emoji + label
                    gridHtml += `<div class="grid-item ${selectedClass}" data-grid-index="${i}" data-global="${startIdx + i}">
                        <div class="thumb-icon">${img.emoji}</div>
                        <span class="image-label">${img.name}</span>
                    </div>`;
                }
                gridHtml += '</div>';
                // add a tiny scroll hint
                gridHtml += '<div class="hint-text">◀ ▶ wheel moves · OK selects · MENU back to grid</div>';
                displayPanel.innerHTML = gridHtml;

                // after rendering, attach click handler for direct grid clicks (optional but nice)
                document.querySelectorAll('.grid-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        // if click on grid, we set selected index, and if they want to enlarge they still need ok.
                        const idx = item.dataset.gridIndex;
                        if (idx !== undefined) {
                            selectedIndexInPage = parseInt(idx, 10);
                            // also if they doubleclick? but we stick to spec: "ok" makes bigger
                            renderDisplay();
                        }
                    });
                });

            } else {
                // enlarged mode: show single big image
                const img = allImages[enlargedImageIndex];
                const pageOfThis = Math.floor(enlargedImageIndex / IMGS_PER_PAGE);
                const pos = (enlargedImageIndex % IMGS_PER_PAGE) + 1;
                displayPanel.innerHTML = `
                    <div class="single-view">
                        <div class="big-image">${img.emoji}</div>
                        <div class="big-label">${img.name}  #${enlargedImageIndex+1}</div>
                        <div class="hint-text">🔽 MENU to return to 3x3 grid</div>
                    </div>
                `;
            }
        }

        // move wheel (direction: 'up','down','left','right')
        function handleWheel(direction) {
            if (enlargedMode) {
                // in enlarged mode, wheel could be used to change image? spec says: only grid scrolls, OK enlarges, menu back.
                // But we can allow wheel in enlarged mode to browse next/prev image (makes sense, but spec not strict)
                // However spec: "button wheel is interactive to move to the next image in a 3x3 grid that scrolls down after you keep moving images"
                // In enlarged view, we could disable or still allow (but let's disable as per "ok" makes bigger and menu back)
                // I'll keep it disabled (no movement) to avoid complexity. but up/down could change big image if we wanted – better keep minimal.
                // So do nothing in enlarged.
                return;
            }

            // grid mode: move selection & scroll page if needed
            let newSelected = selectedIndexInPage;
            let newPage = currentPage;

            if (direction === 'up') {
                if (selectedIndexInPage - 3 >= 0) {
                    newSelected -= 3;
                } else {
                    // scroll page up (previous page) if possible, wrap? let's scroll but keep selection similar (row 2 becomes row 2? but we'll set to bottom row)
                    if (currentPage > 0) {
                        newPage = currentPage - 1;
                        // move to same column? better keep column but go to last row (index = col + 6)
                        const col = selectedIndexInPage % 3;
                        newSelected = 6 + col;  // last row (index 6,7,8)
                    } // else at first page, no scroll
                }
            } else if (direction === 'down') {
                if (selectedIndexInPage + 3 < IMGS_PER_PAGE) {
                    newSelected += 3;
                } else {
                    // scroll down to next page if exists
                    if (currentPage < TOTAL_PAGES - 1) {
                        newPage = currentPage + 1;
                        const col = selectedIndexInPage % 3;
                        newSelected = col; // top row (0,1,2)
                    }
                }
            } else if (direction === 'left') {
                if (selectedIndexInPage % 3 !== 0) {
                    newSelected -= 1;
                } else {
                    // wrap to previous page? optional but spec "scrolls down after you keep moving" but left/right also? we allow scroll left at leftmost? go to prev page same row?
                    // we'll implement: at left edge, go to previous page, column 2 (rightmost)
                    if (currentPage > 0) {
                        newPage = currentPage - 1;
                        const row = Math.floor(selectedIndexInPage / 3);
                        newSelected = row * 3 + 2;  // rightmost column in same row
                    }
                }
            } else if (direction === 'right') {
                if (selectedIndexInPage % 3 !== 2) {
                    newSelected += 1;
                } else {
                    if (currentPage < TOTAL_PAGES - 1) {
                        newPage = currentPage + 1;
                        const row = Math.floor(selectedIndexInPage / 3);
                        newSelected = row * 3;  // leftmost column
                    }
                }
            }

            // apply changes
            currentPage = newPage;
            selectedIndexInPage = newSelected;
            renderDisplay();
        }

        // wheel click handling via quadrant (simple)
        function handleWheelClick(e) {
            if (enlargedMode) return; // no movement when enlarged

            const rect = wheel.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clickX = e.clientX;
            const clickY = e.clientY;

            const dx = clickX - centerX;
            const dy = clickY - centerY;

            if (Math.abs(dx) > Math.abs(dy)) {
                // left or right
                if (dx > 0) {
                    handleWheel('right');
                } else {
                    handleWheel('left');
                }
            } else {
                if (dy > 0) {
                    handleWheel('down');
                } else {
                    handleWheel('up');
                }
            }
        }

        // OK button
        function handleOk() {
            if (!enlargedMode) {
                // switch to enlarged view with currently selected image
                const globalIdx = globalIndex(currentPage, selectedIndexInPage);
                enlargedImageIndex = globalIdx;
                enlargedMode = true;
                renderDisplay();
            } else {
                // already enlarged, maybe do nothing (or could act as select? but spec: "ok" makes the image bigger as you have selected it.
                // so while enlarged, ok does nothing extra.
            }
        }

        // MENU button: back to grid
        function handleMenu() {
            if (enlargedMode) {
                enlargedMode = false;
                // synchronize page and selected to the previously enlarged image? let's show page where that image belongs.
                // we want highlight that image when return. good ux.
                currentPage = Math.floor(enlargedImageIndex / IMGS_PER_PAGE);
                selectedIndexInPage = enlargedImageIndex % IMGS_PER_PAGE;
                renderDisplay();
            } else {
                // already in grid, could reset to first page? but not needed. maybe just stay.
                // but we can keep as is.
            }
        }

        // initial render
        renderDisplay();

        // Event listeners
        wheel.addEventListener('click', handleWheelClick);

        okBtn.addEventListener('click', handleOk);
        menuBtn.addEventListener('click', handleMenu);

        // optional: keyboard support (bonus)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') handleWheel('up');
            else if (e.key === 'ArrowDown') handleWheel('down');
            else if (e.key === 'ArrowLeft') handleWheel('left');
            else if (e.key === 'ArrowRight') handleWheel('right');
            else if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                handleOk();
            }
            else if (e.key === 'Escape') handleMenu();
        });

        // also allow clicking wheel inner? already covered

        // tiny extra: make wheel feel pressable
        wheelInner.addEventListener('click', (e) => {
            // treat as center? maybe do nothing but stop prop
            e.stopPropagation();
        });

    })();
</script>
</body>
</html>
