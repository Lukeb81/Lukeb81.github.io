<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikon Z9 · Back Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        /* main camera body - magnesium alloy look */
        .z9-body {
            width: 950px;
            max-width: 100%;
            background: #1e1e1e;
            background: linear-gradient(145deg, #232323 0%, #1a1a1a 100%);
            border-radius: 45px 45px 35px 35px;
            padding: 28px 28px 35px 28px;
            box-shadow: 
                0 30px 40px rgba(0,0,0,0.8),
                inset -2px -2px 10px rgba(0,0,0,0.8),
                inset 2px 2px 8px rgba(120,120,120,0.3);
            border: 1px solid #3f3f3f;
            position: relative;
        }

        /* top plate with Z9 branding */
        .top-plate {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
            color: #b0b0b0;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .model-badge {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .nikon-logo {
            font-size: 22px;
            font-weight: 700;
            color: #dddddd;
            font-family: 'Times New Roman', serif;
            letter-spacing: 1px;
        }
        .z9-text {
            font-size: 24px;
            font-weight: 600;
            color: #e6b422;
            background: #2a2a2a;
            padding: 3px 12px;
            border-radius: 30px;
            border: 1px solid #5a5a5a;
            box-shadow: inset 0 1px 3px #0a0a0a;
        }
        .top-grip {
            width: 80px;
            height: 18px;
            background: #2c2c2c;
            border-radius: 20px;
            border: 1px solid #464646;
            box-shadow: inset 0 2px 5px #0f0f0f;
        }

        /* main display area - with Z9's 4-axis tilt visual */
        .display-section {
            background: #111111;
            border-radius: 20px 20px 18px 18px;
            padding: 22px 20px 20px 20px;
            margin-bottom: 22px;
            border: 2px solid #4a4a4a;
            box-shadow: 
                inset 0 0 0 2px #2b2b2b,
                0 10px 0 #0b0b0b;
            position: relative;
        }

        /* simulate the tilting mechanism */
        .display-section::after {
            content: "";
            position: absolute;
            bottom: -12px;
            left: 30px;
            width: 40px;
            height: 12px;
            background: #2d2d2d;
            border-radius: 0 0 8px 8px;
            border-left: 2px solid #5a5a5a;
            border-right: 2px solid #5a5a5a;
            border-bottom: 2px solid #5a5a5a;
        }

        /* screen content - changes based on mode */
        .z9-screen {
            background: #0a0a1a;
            border-radius: 12px;
            padding: 20px;
            min-height: 280px;
            border: 3px solid #3d3d3d;
            box-shadow: inset 0 0 30px #000000;
            transition: all 0.2s;
        }

        /* 3x2 grid (Z9 uses 3x2 in playback, but we'll use 3x3 for your requirement) */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .grid-item {
            background: #1e2a2e;
            border-radius: 12px;
            border: 2px solid #4b6a7a;
            box-shadow: 0 4px 0 #102020;
            aspect-ratio: 4/3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #c0e0ff;
            font-size: 32px;
            padding: 10px;
            transition: all 0.1s;
            cursor: pointer;
        }

        .grid-item.selected {
            border: 4px solid #ffcc00;
            box-shadow: 0 0 0 2px #ffe066, 0 4px 0 #102020;
            transform: scale(1.02);
            background: #2a3a42;
        }

        .grid-item .label {
            font-size: 14px;
            background: #00000080;
            padding: 4px 8px;
            border-radius: 20px;
            margin-top: 6px;
            color: white;
            border: 1px solid #7a9bb5;
        }

        /* enlarged view */
        .single-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
        }
        .big-emoji {
            font-size: 120px;
            background: #15232b;
            padding: 30px 50px;
            border-radius: 30px;
            border: 2px solid #5d869e;
            box-shadow: inset 0 0 30px #000000;
            margin-bottom: 20px;
        }
        .big-name {
            font-size: 28px;
            background: #00000070;
            padding: 8px 30px;
            border-radius: 50px;
            color: #ffde9e;
            border: 1px solid #b99e5c;
        }

        /* Z9 back button panel - the real deal */
        .button-panel {
            display: flex;
            gap: 20px;
            padding: 15px 10px 5px 10px;
        }

        /* left side - minimal (Z9 has very few left-side buttons) */
        .left-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 90px;
        }
        .left-btn {
            background: #2a2a2a;
            border-radius: 30px;
            padding: 14px 0;
            text-align: center;
            color: #ddd;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid #4c4c4c;
            border-bottom: 5px solid #151515;
            box-shadow: inset 1px 2px 5px #6a6a6a;
            cursor: default;
        }
        .fn4-btn {
            background: #2d2d2d;
            color: #ffd966;
        }

        /* RIGHT SIDE - where all the Z9 controls live */
        .right-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* top row - AF-ON, joystick area */
        .top-row {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .af-on {
            background: #2a2a2a;
            border-radius: 40px;
            padding: 14px 22px;
            font-weight: 600;
            color: #ddd;
            border: 2px solid #5c5c5c;
            border-bottom: 5px solid #1a1a1a;
            box-shadow: inset 1px 2px 5px #6f6f6f;
            font-size: 16px;
            min-width: 80px;
            text-align: center;
        }

        /* the famous Nikon joystick / multi-selector */
        .joystick-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .joystick {
            width: 70px;
            height: 70px;
            background: #2e2e2e;
            border-radius: 40px;
            border: 3px solid #666;
            box-shadow: inset -2px -2px 10px #111, inset 2px 2px 8px #8f8f8f;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.05s;
            margin-bottom: 5px;
        }
        .joystick-inner {
            width: 30px;
            height: 30px;
            background: #3d3d3d;
            border-radius: 50%;
            border: 2px solid #a0a0a0;
        }
        .joystick-label {
            color: #aaa;
            font-size: 12px;
        }

        /* middle row - i button + selector */
        .mid-row {
            display: flex;
            align-items: center;
            gap: 18px;
        }
        .i-btn {
            background: #2a2a2a;
            border-radius: 40px;
            padding: 12px 22px;
            font-weight: 600;
            border: 2px solid #5c5c5c;
            border-bottom: 5px solid #1a1a1a;
            color: #b8d0ff;
            font-size: 18px;
            box-shadow: inset 1px 2px 5px #6f6f6f;
            cursor: default;
        }
        .zoom-ring {
            display: flex;
            gap: 8px;
        }
        .zoom-btn {
            background: #2a2a2a;
            border-radius: 30px;
            padding: 12px 22px;
            border: 2px solid #5c5c5c;
            border-bottom: 5px solid #1a1a1a;
            color: #ccc;
            font-weight: 600;
            font-size: 16px;
            box-shadow: inset 1px 2px 5px #6f6f6f;
        }

        /* bottom row - the iconic Z9 bottom strip (QUAL, WB, etc) */
        .bottom-row {
            display: flex;
            gap: 12px;
            background: #1f1f1f;
            padding: 15px 12px;
            border-radius: 40px;
            border: 2px solid #4b4b4b;
            box-shadow: inset 0 0 10px #0a0a0a;
        }
        .z9-bottom-btn {
            background: #2d2d2d;
            border: none;
            border-bottom: 4px solid #181818;
            border-radius: 30px;
            padding: 12px 0;
            flex: 1;
            color: #ddd;
            font-weight: 600;
            font-size: 15px;
            text-align: center;
            box-shadow: inset 1px 2px 6px #6d6d6d;
            cursor: default;
            letter-spacing: 0.5px;
        }
        .playback-btn {
            background: #3a3a3a;
            color: #ffd966;
        }
        .qual-btn { background: #2b2b2b; }
        .wb-btn { background: #2b2b2b; }
        .voice-btn { background: #2b2b2b; }

        /* our interactive wheel - but Z9 uses joystick, so we repurpose joystick */
        .joystick {
            cursor: pointer;
        }
        .joystick:active .joystick-inner {
            background: #5a5a5a;
        }

        /* main action buttons */
        .action-row {
            display: flex;
            justify-content: flex-end;
            gap: 18px;
            margin-top: 20px;
            padding-right: 10px;
        }
        .ok-menu-btn {
            background: #2d2d2d;
            border: none;
            border-bottom: 5px solid #151515;
            border-radius: 40px;
            padding: 16px 32px;
            font-size: 24px;
            font-weight: 600;
            color: #eee;
            box-shadow: inset 1px 2px 8px #7a7a7a;
            cursor: pointer;
            transition: 0.05s;
            min-width: 130px;
            text-transform: uppercase;
        }
        .ok-menu-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }
        .menu-btn {
            background: #3a3a3a;
            color: #ffd966;
        }

        /* illumination effect (like real Z9) */
        .button-panel .z9-bottom-btn,
        .button-panel .af-on,
        .button-panel .i-btn,
        .left-btn {
            transition: 0.1s;
        }
        .button-panel .z9-bottom-btn:hover,
        .button-panel .af-on:hover,
        .button-panel .i-btn:hover,
        .left-btn:hover {
            background: #3e3e3e;
            box-shadow: 0 0 8px #ffcc0066;
        }

        /* bottom status */
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding: 0 15px;
            color: #7a7a7a;
            font-size: 13px;
        }
        .lock-switch {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .lock-switch div {
            width: 30px;
            height: 12px;
            background: #2a2a2a;
            border-radius: 10px;
            border: 1px solid #5a5a5a;
        }

        /* image data */
        .thumb-icon { font-size: 36px; line-height: 1; }
    </style>
</head>
<body>
<div class="z9-body">
    <!-- top -->
    <div class="top-plate">
        <div class="model-badge">
            <span class="nikon-logo">Nikon</span>
            <span class="z9-text">Z 9</span>
        </div>
        <div class="top-grip"></div>
    </div>

    <!-- display -->
    <div class="display-section">
        <div class="z9-screen" id="z9Screen">
            <!-- dynamic content -->
        </div>
    </div>

    <!-- back button panel - authentic Z9 layout -->
    <div class="button-panel">
        <!-- left side: Fn4, delete etc -->
        <div class="left-buttons">
            <div class="left-btn fn4-btn">Fn4</div>
            <div class="left-btn">🗑️</div>
        </div>

        <!-- right cluster: all the main controls -->
        <div class="right-controls">
            <div class="top-row">
                <div class="af-on">AF-ON</div>
                <div class="joystick-block">
                    <div class="joystick" id="joystickWheel">
                        <div class="joystick-inner"></div>
                    </div>
                    <div class="joystick-label">▼►</div>
                </div>
            </div>

            <div class="mid-row">
                <div class="i-btn">i</div>
                <div class="zoom-ring">
                    <div class="zoom-btn">🔍-</div>
                    <div class="zoom-btn">🔍+</div>
                </div>
            </div>

            <!-- bottom row: exactly as Z9: NETWORK, VOICE, QUAL, WB, PLAYBACK -->
            <div class="bottom-row">
                <div class="z9-bottom-btn">NET</div>
                <div class="z9-bottom-btn voice-btn">🎤</div>
                <div class="z9-bottom-btn qual-btn">QUAL</div>
                <div class="z9-bottom-btn wb-btn">WB</div>
                <div class="z9-bottom-btn playback-btn">▶️</div>
            </div>
        </div>
    </div>

    <!-- OK and MENU (your required buttons) -->
    <div class="action-row">
        <button class="ok-menu-btn" id="okBtn">OK</button>
        <button class="ok-menu-btn menu-btn" id="menuBtn">MENU</button>
    </div>

    <!-- bottom lock switch simulation -->
    <div class="status-bar">
        <div class="lock-switch">
            <div></div>
            <span>LOCK</span>
        </div>
        <span>NIKON Z 9 · PROTO</span>
    </div>
</div>

<script>
    (function() {
        // image library
        const images = [
            { emoji: '🏔️', name: 'MT. FUJI' },
            { emoji: '🌊', name: 'COAST' },
            { emoji: '🌲', name: 'FOREST' },
            { emoji: '🌃', name: 'NIGHT' },
            { emoji: '🌌', name: 'MILKY WAY' },
            { emoji: '🏜️', name: 'DESERT' },
            { emoji: '🌋', name: 'VOLCANO' },
            { emoji: '🏝️', name: 'ISLAND' },
            { emoji: '🗽', name: 'CITY' },
            { emoji: '🌁', name: 'FOG' },
            { emoji: '🏯', name: 'CASTLE' },
            { emoji: '🛤️', name: 'RAILS' },
            { emoji: '🌅', name: 'SUNRISE' },
            { emoji: '🌇', name: 'SUNSET' },
            { emoji: '❄️', name: 'WINTER' },
            { emoji: '🌈', name: 'RAINBOW' },
            { emoji: '⛰️', name: 'PEAK' },
            { emoji: '🏖️', name: 'BEACH' }
        ];

        let currentPage = 0;          // 0..1 (for simplicity, 2 pages of 9)
        let selectedIndex = 0;         // 0-8 within page
        let enlargedMode = false;
        let enlargedGlobalIndex = 0;

        const screenEl = document.getElementById('z9Screen');
        const joystick = document.getElementById('joystickWheel');
        const okBtn = document.getElementById('okBtn');
        const menuBtn = document.getElementById('menuBtn');

        function getGlobalIndex(page, idx) {
            return page * 9 + idx;
        }

        function render() {
            if (!enlargedMode) {
                // grid mode (3x3)
                const start = currentPage * 9;
                const pageImgs = images.slice(start, start + 9);

                let html = '<div class="image-grid">';
                pageImgs.forEach((img, i) => {
                    const selClass = (i === selectedIndex) ? 'selected' : '';
                    html += `<div class="grid-item ${selClass}" data-idx="${i}">
                        <div class="thumb-icon">${img.emoji}</div>
                        <span class="label">${img.name}</span>
                    </div>`;
                });
                html += '</div>';
                html += '<div style="color:#aaa; text-align:center; margin-top:12px;">▲▼◄► JOYSTICK · OK = ENLARGE · MENU = GRID</div>';
                screenEl.innerHTML = html;

                // click on grid item to select
                document.querySelectorAll('.grid-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const idx = item.dataset.idx;
                        if (idx !== undefined) {
                            selectedIndex = parseInt(idx, 10);
                            render();
                        }
                    });
                });
            } else {
                // enlarged mode
                const img = images[enlargedGlobalIndex];
                screenEl.innerHTML = `
                    <div class="single-view">
                        <div class="big-emoji">${img.emoji}</div>
                        <div class="big-name">${img.name}</div>
                        <div style="color:#aaa; margin-top:20px;">MENU to return</div>
                    </div>
                `;
            }
        }

        // joystick direction handling
        function handleJoystick(dir) {
            if (enlargedMode) return;

            let newIdx = selectedIndex;
            let newPage = currentPage;

            if (dir === 'up') {
                if (selectedIndex >= 3) newIdx -= 3;
                else if (currentPage > 0) { newPage--; newIdx = selectedIndex + 6; } // wrap to previous page bottom row
            } else if (dir === 'down') {
                if (selectedIndex < 6) newIdx += 3;
                else if (currentPage < 1) { newPage++; newIdx = selectedIndex - 6; } // wrap to next page top row
            } else if (dir === 'left') {
                if (selectedIndex % 3 !== 0) newIdx--;
                else if (currentPage > 0) { newPage--; newIdx = selectedIndex + 2; }
            } else if (dir === 'right') {
                if (selectedIndex % 3 !== 2) newIdx++;
                else if (currentPage < 1) { newPage++; newIdx = selectedIndex - 2; }
            }

            currentPage = newPage;
            selectedIndex = newIdx;
            render();
        }

        // joystick click detection
        joystick.addEventListener('click', (e) => {
            e.stopPropagation();
            const rect = joystick.getBoundingClientRect();
            const cx = rect.left + rect.width/2;
            const cy = rect.top + rect.height/2;
            const dx = e.clientX - cx;
            const dy = e.clientY - cy;

            if (Math.abs(dx) > Math.abs(dy)) {
                handleJoystick(dx > 0 ? 'right' : 'left');
            } else {
                handleJoystick(dy > 0 ? 'down' : 'up');
            }
        });

        okBtn.addEventListener('click', () => {
            if (!enlargedMode) {
                enlargedGlobalIndex = getGlobalIndex(currentPage, selectedIndex);
                enlargedMode = true;
                render();
            }
        });

        menuBtn.addEventListener('click', () => {
            if (enlargedMode) {
                enlargedMode = false;
                // set page to the page of enlarged image
                currentPage = Math.floor(enlargedGlobalIndex / 9);
                selectedIndex = enlargedGlobalIndex % 9;
                render();
            } else {
                // already grid, maybe reset to page 0? no, stay.
            }
        });

        // keyboard support
        window.addEventListener('keydown', (e) => {
            if (e.key.startsWith('Arrow')) {
                e.preventDefault();
                const dir = e.key.replace('Arrow', '').toLowerCase();
                handleJoystick(dir);
            } else if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                okBtn.click();
            } else if (e.key === 'Escape') {
                menuBtn.click();
            }
        });

        // initial
        render();

        // simulate button illumination (like Z9)
        // just for looks
    })();
</script>
</body>
</html>
